name: Agent Eval

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 09:00 UTC
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

jobs:
  eval:
    name: Run Agent Eval (${{ github.event.inputs.environment || 'staging' }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run eval
        run: python evals/run_eval.py --env ${{ github.event.inputs.environment || 'staging' }}
        env:
          AGENT_BASE_URL: ${{ secrets.AGENT_BASE_URL }}
          EVAL_API_KEY: ${{ secrets.EVAL_API_KEY }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_id }}
          path: evals/results/
          retention-days: 30
